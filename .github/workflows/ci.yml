name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Quality / Check
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Swift toolchain
        run: swift --version

      - name: Bootstrap
        run: ./script/bootstrap

      - name: Build and test
        run: ./script/check

  release-smoke:
    name: Quality / Release smoke
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Swift toolchain
        run: swift --version

      - name: Bootstrap
        run: ./script/bootstrap

      - name: Stage and inspect the app bundle
        run: ./script/verify

      - name: Validate release metadata
        env:
          BONSAI_PREFLIGHT_SKIP_CHANGELOG: '1'
        run: ./script/release-preflight 0.0.0

  quality:
    name: Quality
    if: always()
    needs: [check, release-smoke]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require every quality lane
        env:
          CHECK_RESULT: ${{ needs.check.result }}
          RELEASE_SMOKE_RESULT: ${{ needs.release-smoke.result }}
        run: |
          for result in "$CHECK_RESULT" "$RELEASE_SMOKE_RESULT"; do
            if [[ "$result" != "success" ]]; then
              echo "A required quality lane finished with: $result" >&2
              exit 1
            fi
          done
