name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag (vX.Y.Z)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Signed macOS release
    runs-on: macos-26
    timeout-minutes: 90
    env:
      REPO: ${{ github.repository }}
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Validate tag and release source
        run: |
          version="${TAG#v}"
          ./script/release-preflight "$version"
          if ! git show-ref --verify --quiet "refs/tags/$TAG"; then
            echo "error: $TAG is not an existing tag." >&2
            exit 1
          fi
          if [ "$(git rev-list -n 1 "$TAG")" != "$(git rev-parse HEAD)" ]; then
            echo "error: the checked-out commit does not match $TAG." >&2
            exit 1
          fi
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor "$(git rev-parse HEAD)" origin/main; then
            echo "error: $TAG does not point to a commit contained in main." >&2
            exit 1
          fi

      - name: Require release credentials
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          missing=0
          for name in \
            MACOS_CERTIFICATE_P12_BASE64 \
            MACOS_CERTIFICATE_PASSWORD \
            APPLE_API_KEY_P8 \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER_ID \
            APPLE_TEAM_ID \
            SPARKLE_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for a public release."
              missing=1
            fi
          done
          exit "$missing"

      - name: Bootstrap
        run: ./script/bootstrap

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="bonsai-${{ github.run_id }}"
          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | base64 -D > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm -f "$RUNNER_TEMP/certificate.p12"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          printf '%s' "$APPLE_API_KEY_P8" > "$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"

      - name: Build, sign, notarize, and staple
        env:
          NOTARY_PROFILE: ''
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          export BONSAI_VERSION="${TAG#v}"
          ./script/notarize.sh

      - name: Verify release artifacts
        env:
          BONSAI_VERIFY_EXISTING: '1'
        run: |
          ./script/verify
          test -f dist/BonsAI.app.zip
          test -f dist/BonsAI.app.zip.sha256
          test -f dist/BonsAI.dmg
          test -f dist/BonsAI.dmg.sha256
          shasum -a 256 -c dist/BonsAI.app.zip.sha256
          shasum -a 256 -c dist/BonsAI.dmg.sha256
          codesign --verify --deep --strict --verbose=2 dist/BonsAI.app
          xcrun stapler validate dist/BonsAI.app
          xcrun stapler validate dist/BonsAI.dmg
          spctl --assess --type exec --verbose=2 dist/BonsAI.app
          spctl --assess --type open --verbose=2 dist/BonsAI.dmg

      - name: Assemble release notes
        run: |
          version="${TAG#v}"
          awk -v version="$version" '
            index($0, "## [" version "]") == 1 { capture = 1; next }
            capture && index($0, "## ") == 1 { exit }
            capture { print }
          ' CHANGELOG.md | sed -e '/./,$!d' > dist/RELEASE_NOTES.md
          if ! grep -q '[^[:space:]]' dist/RELEASE_NOTES.md; then
            echo "error: CHANGELOG.md release section for $version is empty." >&2
            exit 1
          fi

      - name: Render release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY_HTML="$(gh api markdown -f mode=gfm -f text="$(cat dist/RELEASE_NOTES.md)" || true)"
          if [ -z "$BODY_HTML" ]; then
            BODY_HTML="<pre style=\"white-space:pre-wrap\">$(sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' dist/RELEASE_NOTES.md)</pre>"
          fi
          cat > dist/RELEASE_NOTES.html <<HTML
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"><style>
            :root { color-scheme: light dark; }
            body { font: 13px/1.55 -apple-system, 'Helvetica Neue', sans-serif; margin: 14px 16px; color: #1d1d1f; }
            h1, h2, h3 { font-size: 13px; font-weight: 600; margin: 14px 0 4px; text-transform: uppercase; letter-spacing: .04em; opacity: .55; }
            ul { margin: 4px 0 10px; padding-left: 20px; }
            li, p { margin: 4px 0; }
            code, pre { font-family: ui-monospace, 'SF Mono', Menlo, monospace; background: rgba(127,127,127,.14); border-radius: 5px; }
            code { padding: 1px 4px; }
            pre { padding: 8px 10px; overflow-x: auto; }
            a { color: #0969da; text-decoration: none; }
            @media (prefers-color-scheme: dark) { body { color: #e8e8ed; } a { color: #6cb2ff; } }
          </style></head><body>
          $BODY_HTML
          </body></html>
          HTML

      - name: Generate signed Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          version="${TAG#v}"
          SIGN_UPDATE="$(find .build/artifacts -name sign_update -path '*/bin/*' | head -1)"
          if [ -z "$SIGN_UPDATE" ]; then
            echo "error: Sparkle sign_update was not resolved." >&2
            exit 1
          fi
          KEY_FILE="$RUNNER_TEMP/sparkle_ed_key"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          SIGNATURE_ATTRIBUTES="$("$SIGN_UPDATE" --ed-key-file "$KEY_FILE" dist/BonsAI.app.zip)"
          rm -f "$KEY_FILE"
          PUBDATE="$(date -u +'%a, %d %b %Y %H:%M:%S +0000')"
          NOTES="$(sed 's/]]>/]]\&gt;/g' dist/RELEASE_NOTES.html)"
          cat > dist/appcast.xml <<XML
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
          <channel>
          <title>BonsAI</title>
          <link>https://github.com/$REPO/releases/latest/download/appcast.xml</link>
          <item>
          <title>BonsAI $version</title>
          <pubDate>$PUBDATE</pubDate>
          <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
          <sparkle:fullReleaseNotesLink>https://github.com/$REPO/releases</sparkle:fullReleaseNotesLink>
          <description><![CDATA[
          $NOTES
          ]]></description>
          <enclosure url="https://github.com/$REPO/releases/download/$TAG/BonsAI.app.zip" sparkle:version="$version" sparkle:shortVersionString="$version" $SIGNATURE_ATTRIBUTES type="application/octet-stream" />
          </item>
          </channel>
          </rss>
          XML
          xmllint --noout dist/appcast.xml

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(
            dist/BonsAI.dmg
            dist/BonsAI.dmg.sha256
            dist/BonsAI.app.zip
            dist/BonsAI.app.zip.sha256
            dist/appcast.xml
          )
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" --repo "$REPO" --clobber "${assets[@]}"
          else
            gh release create "$TAG" \
              --repo "$REPO" \
              --verify-tag \
              --title "BonsAI $TAG" \
              --notes-file dist/RELEASE_NOTES.md \
              "${assets[@]}"
          fi
          gh release view "$TAG" --repo "$REPO" --json url,tagName,assets
